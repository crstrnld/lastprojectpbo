# ============================================================
# Library Management System - Quarkus configuration
# ============================================================

# --- HTTP ---
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.access-control-max-age=24H

# --- Datasource (PostgreSQL) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:library_user}
quarkus.datasource.password=${DB_PASSWORD:library_pass}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/library_db}

# --- Hibernate ORM ---
# Flyway manages the schema; Hibernate only validates it against the entities.
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false

# --- Flyway migrations ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
# false = run every migration from scratch on a fresh database (correct for
# this project). Only set this to true if you're adopting Flyway into a
# database that already has hand-created tables you want to skip past.
quarkus.flyway.baseline-on-migrate=false

# --- JWT (SmallRye JWT) ---
mp.jwt.verify.issuer=https://library-management.example.com
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.issuer=https://library-management.example.com
smallrye.jwt.new-token.lifespan=86400

# --- Logging ---
quarkus.log.level=INFO
quarkus.log.category."com.library".level=DEBUG

# --- Dev/Test profile overrides ---
# Note: no jdbc.url override here on purpose - the base property above
# (which reads DB_URL/DB_USER/DB_PASSWORD) already applies in dev mode.
# Overriding it per-profile would silently ignore those env vars.
%dev.quarkus.hibernate-orm.database.generation=update
%dev.quarkus.flyway.migrate-at-start=true

%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/library_db_test
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.flyway.migrate-at-start=false
